<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Support Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header>
      <h1>Voice Support Agent</h1>
      <p>Click the mic, speak your question, and get an instant voice answer</p>
    </header>

    <!-- Conversation -->
    <div class="conversation" id="conversation">

      <!-- User message (hidden until transcription arrives) -->
      <div class="message user-message" id="userMsg" style="display:none;">
        <div class="message-label">You said</div>
        <div class="message-text" id="transcriptionText"></div>
      </div>

      <!-- Sentiment badge (hidden until sentiment arrives) -->
      <div class="sentiment-badge" id="sentimentBadge">
        <span class="sentiment-dot"></span>
        <span class="sentiment-label"></span>
      </div>

      <!-- Agent message (hidden until tokens start arriving) -->
      <div class="message agent-message" id="agentMsg" style="display:none;">
        <div class="message-label">Support Agent</div>
        <div class="message-text" id="responseText"></div>
      </div>

      <!-- Audio playing indicator -->
      <div class="audio-playing" id="audioPlaying">
        <div class="audio-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span>Playing response&hellip;</span>
      </div>

      <div class="spacer"></div>
    </div>

    <!-- Bottom controls -->
    <div class="bottom-panel">
      <div class="mic-wrap" id="micWrap">
        <button class="mic-btn" id="micBtn" title="Click to speak">

          <!-- Mic icon -->
          <svg class="icon-mic" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="13" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8"  y1="22" x2="16" y2="22"/>
          </svg>

          <!-- Stop icon (shown while recording) -->
          <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>

        </button>
      </div>

      <div class="status-line" id="statusLine">Click the mic to start</div>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
